
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official HS - Music</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center p-6 font-sans">

    <div class="max-w-md w-full text-center space-y-8">
        <!-- Profile Header -->
        <header class="space-y-4">
            <img src="https://yt3.googleusercontent.com/HNGSLtnXo1zF4gcUrs_5dITEUvu587BtSy4yPHrpvQ1KmVRvT-LWY48Fta0sWvnQYThc5JGd2w=s800-c-k-c0x00ffffff-no-rj" 
                 alt="Official HS" 
                 class="w-32 h-32 rounded-full mx-auto shadow-xl border-4 border-slate-800 object-cover">
            <div>
                <h1 class="text-2xl font-bold">Official HS</h1>
                <p class="text-slate-400">Stream my music on your favorite platform</p>
            </div>
        </header>

        <!-- Highlighted Songs -->
        <section class="space-y-4">
            <h2 class="text-xs uppercase tracking-widest text-slate-500 font-semibold">Featured Tracks</h2>
            
            <a href="https://music.youtube.com/watch?v=sHOvGLrLOIo" class="block bg-slate-900 p-4 rounded-xl border border-slate-800 hover:border-red-500 transition text-left flex items-center gap-4">
                <img src="https://i.scdn.co/image/ab67616d0000b2738ee56363a65142f74b5c15dc" alt="Track Artwork" class="w-12 h-12 rounded-lg object-cover">
                <div>
                    <div class="font-medium text-sm">Listen on YouTube Music</div>
                </div>
            </a>

            <a href="https://open.spotify.com/track/52iLBukJOGedF42jqWdhEp" class="block bg-slate-900 p-4 rounded-xl border border-slate-800 hover:border-green-500 transition text-left flex items-center gap-4">
                <img src="https://i.scdn.co/image/ab67616d0000b2738ee56363a65142f74b5c15dc" alt="Track Artwork" class="w-12 h-12 rounded-lg object-cover">
                <div>
                    <div class="font-medium text-sm">Listen on Spotify</div>
                </div>
            </a>
        </section>

        <!-- Support Section -->
        <section class="space-y-4">
            <h2 class="text-xs uppercase tracking-widest text-slate-500 font-semibold">Support</h2>
            <a href="https://paypal.me/procat999" class="block w-full py-3 px-6 bg-blue-600 hover:bg-blue-500 font-semibold rounded-lg transition text-white">
                Support via PayPal
            </a>
        </section>

        <!-- Social Links -->
        <section class="space-y-4">
            <h2 class="text-xs uppercase tracking-widest text-slate-500 font-semibold">Profiles</h2>
            <div class="grid grid-cols-1 gap-3">
                <a href="https://youtube.com/@officalhs" class="py-3 px-6 bg-slate-800 hover:bg-slate-700 font-semibold rounded-lg transition border border-slate-700">YouTube</a>
                <a href="https://open.spotify.com/artist/6x5GNGZmWKhhpnInvCKesB" class="py-3 px-6 bg-slate-800 hover:bg-slate-700 font-semibold rounded-lg transition border border-slate-700">Spotify Artist</a>
                <a href="#" class="py-3 px-6 bg-slate-800 hover:bg-slate-700 font-semibold rounded-lg transition border border-slate-700">Apple Music</a>
            </div>
        </section>
    </div>

</body>
</html>
